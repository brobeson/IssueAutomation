name: Issue and PR Automation
on:
  workflow_call:
    # inputs:
    #   project_id:
    #     required: true
    #     description: The numeric ID of the Github project
    #     type: number
    secrets:
      personal_access_token:
        required: true
        description: An access token with `project` permission
  # issues:
  #   types: [opened, reopened, transferred]
  # pull_request:
  #   types: [opened, reopened]

jobs:
  add-to-project:
    name: Issue and PR Automation
    runs-on: ubuntu-latest
    steps:
      - name: Add to project
        uses: actions/add-to-project@v2
        with:
          project-url: https://github.com/users/brobeson/projects/17
          github-token: ${{ secrets.personal_access_token }}
